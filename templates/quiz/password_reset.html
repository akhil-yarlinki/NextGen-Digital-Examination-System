{% extends 'quiz/base.html' %}

{% block content %}
<div class="form-card">
    <h2>Forgot Password</h2>

    <form method="post">
        {% csrf_token %}
        <label>Email</label>
        <input type="email" name="email" placeholder="Enter your email">
        <button type="submit" class="btn btn-primary" style="width:100%;">Send Reset Link</button>
    </form>
</div>
{% endblock %}
